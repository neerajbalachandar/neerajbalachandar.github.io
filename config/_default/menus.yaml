# Navigation Links
#   To link a homepage widget, specify the URL as a hash `#` followed by the filename of the
  #     desired widget in your `content/home/` folder.
  #   The weight parameter defines the order that the links will appear in.

main:
  - name: Home
    url: /
    weight: 10
  - name: Research Focus
    url: /#research
    weight: 20
  - name: Projects
    url: projects/
    weight: 30
  - name: Publications
    url: publication/
    weight: 40
  - name: News
    url: post/
    weight: 50
  - name: Experience
    url: experience/
    weight: 60
