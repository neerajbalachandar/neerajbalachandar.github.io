<script async defer src="https://buttons.github.io/buttons.js"></script>
<link rel="icon" type="image/png" href="/uploads/favicon.png">
<link rel="shortcut icon" type="image/png" href="/uploads/favicon.png">
<style>
  .container,
  .container-lg,
  .container-xl,
  .container-xxl {
    max-width: 1420px;
  }

  .article-container {
    max-width: 1360px;
  }

  .home-section {
    padding-top: 2.1rem;
    padding-bottom: 2.1rem;
  }

  .card-image img,
  .card-simple img {
    width: 100%;
    height: 330px;
    object-fit: contain;
    background: #f3f7f5;
  }

  .project-publications-panel {
    position: sticky;
    top: 5.5rem;
    width: 100%;
    margin: 1rem 0 0 0;
    padding: 1rem 1.1rem;
    border: 2px solid #0f766e;
    border-left-width: 6px;
    border-radius: 12px;
    background: #fff9db;
    box-shadow: 0 10px 24px rgba(15, 118, 110, 0.12);
  }

  .project-publications-panel h3 {
    margin-top: 0;
    margin-bottom: 0.75rem;
    color: #065f46;
    font-size: 1.05rem;
    font-weight: 800;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .project-publications-panel ul {
    margin: 0;
    padding-left: 1.1rem;
  }

  .project-publications-panel li {
    margin-bottom: 0.55rem;
  }

  .project-detail-figure {
    margin: 0 0 1.25rem 0;
  }

  .project-detail-figure img,
  .article-page .article-header img,
  .article-page .article-style img {
    width: 100%;
    max-width: 100%;
    height: auto;
    object-fit: contain;
    border-radius: 10px;
  }

  main .share-box,
  main .article-share,
  main .network-icon,
  main .share,
  main .author-card,
  main .post-nav,
  main a[rel="prev"],
  main a[rel="next"] {
    display: none !important;
  }

  @media (max-width: 992px) {
    .project-publications-panel {
      position: static;
      margin: 0.8rem 0 1rem 0;
    }
  }
</style>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    document
      .querySelectorAll(
        "a[href*='facebook.com'], a[href*='twitter.com'], a[href*='x.com/intent'], a[href*='linkedin.com'], a[href*='wa.me'], a[href*='t.me']"
      )
      .forEach(function (a) {
        var wrap = a.closest("li, span, div");
        if (wrap) {
          wrap.remove();
        } else {
          a.remove();
        }
      });

    document
      .querySelectorAll("a[rel='prev'], a[rel='next']")
      .forEach(function (a) {
        var wrap = a.closest("nav, section, div");
        if (wrap) wrap.remove();
      });
  });
</script>
