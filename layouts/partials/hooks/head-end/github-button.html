<script async defer src="https://buttons.github.io/buttons.js"></script>
<link rel="icon" type="image/png" href="/uploads/favicon.png">
<link rel="shortcut icon" type="image/png" href="/uploads/favicon.png">
<style>
  .container,
  .container-lg,
  .container-xl,
  .container-xxl {
    max-width: 1360px;
  }

  .article-container {
    max-width: 1080px;
  }

  .home-section {
    padding-top: 2.1rem;
    padding-bottom: 2.1rem;
  }

  .card-image img,
  .card-simple img {
    width: 100%;
    height: 290px;
    object-fit: contain;
    background: #f3f7f5;
  }

  .project-publications-panel {
    position: sticky;
    top: 5.5rem;
    width: 100%;
    margin: 0.8rem 0 0 0;
    padding: 1rem 1.1rem;
    border: 1px solid #d8e5df;
    border-radius: 12px;
    background: #f7fbf9;
  }

  .project-publications-panel h3 {
    margin-top: 0;
    margin-bottom: 0.75rem;
    font-size: 1.05rem;
  }

  .project-publications-panel ul {
    margin: 0;
    padding-left: 1.1rem;
  }

  .project-publications-panel li {
    margin-bottom: 0.55rem;
  }

  .project-detail-figure {
    margin: 0 0 1.25rem 0;
  }

  .project-detail-figure img,
  .article-page .article-header img,
  .article-page .article-style img {
    width: 100%;
    max-width: 100%;
    height: auto;
    object-fit: contain;
    border-radius: 10px;
  }

  .article-page .share-box,
  .article-page .article-share,
  .article-page .network-icon,
  .article-page .share,
  .article-page .author-card,
  .article-page .post-nav,
  .article-page a[rel="prev"],
  .article-page a[rel="next"] {
    display: none !important;
  }

  @media (max-width: 992px) {
    .project-publications-panel {
      position: static;
      margin: 0.8rem 0 1rem 0;
    }
  }
</style>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    var panel = document.querySelector(".project-publications-panel");
    if (panel) {
      var toc = document.getElementById("TableOfContents");
      var target = null;

      if (toc) {
        target = toc.closest("aside, nav, section, div") || toc.parentElement;
      } else {
        var candidates = Array.from(
          document.querySelectorAll("aside, nav, section, div")
        ).filter(function (el) {
          return /On this page/i.test((el.textContent || "").trim());
        });
        if (candidates.length) target = candidates[0];
      }

      if (target) {
        target.appendChild(panel);
      }
    }

    document
      .querySelectorAll("a[rel='prev'], a[rel='next']")
      .forEach(function (a) {
        var wrap = a.closest("nav, section, div");
        if (wrap) wrap.remove();
      });
  });
</script>
